name: C Build and Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: List C files
      run: find . -type f -name "*.c"

    - name: Build (compile check)
      shell: bash
      run: |
        if ! find . -type f -name "*.c" | grep -q .; then
          echo "No C files found."
          exit 1
        fi

        while IFS= read -r -d '' file; do
          echo "Compiling: $file"
          gcc -Wall -Wextra -fsyntax-only "$file"
        done < <(find . -type f -name "*.c" -print0)
