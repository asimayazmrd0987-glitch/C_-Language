<!DOCTYPE html>
<html>
<head>
    <title>Student Admission Form</title>
</head>
<body style="text-align: center;">


    <h2>Student Registration Form</h2>

    <form>

        <label>First Name:</label><br>
        <input type="text" name="Fullname"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Password:</label><br>
        <input type="password" name="Password"><br><br>

        <label>Date of Birth:</label><br>
        <input type="date" name="date"><br><br>

        <label>Program:</label><br>
        <input type="checkbox" name="checkbox" value="CS">CS<br>
        <input type="checkbox" name="checkbox" value="EE">EE<br>
        <input type="checkbox" name="checkbox" value="TE">TE<br>
        <input type="checkbox" name="checkbox" value="ME">ME<br>
        
        
        <label>Skills:</label><br>
        <input type="checkbox" name="checkbox" value="HTML">HTML<br>
        <input type="checkbox" name="checkbox" value="CSS">CSS<br>
        <input type="checkbox" name="checkbox" value="JavaScript">JavaScript<br><br>

        <input type="file" name="fileupload"><br><br>
        
        <label>Adress:</label><br>
        <input type="text" name="Adress"><br><br>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>

    </form>

</body>
</html>
